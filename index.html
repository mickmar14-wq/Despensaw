<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Despensa 📦</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; max-width: 500px; margin: auto; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 20px; border: 1px solid #eee; }
        .btn { width: 100%; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 16px; transition: 0.3s; }
        .btn-scan { background: var(--primary); color: white; }
        .btn-save { background: var(--dark); color: white; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        #status { text-align: center; color: #7f8c8d; font-size: 14px; margin: 10px 0; font-weight: bold; min-height: 20px; }
        .item { background: #fff; padding: 15px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .delete-btn { color: #e74c3c; font-weight: bold; background: none; border: none; padding: 10px; cursor: pointer; }
        label { font-weight: bold; color: var(--dark); font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; margin-top:0; color: var(--dark);">☁️ Inventario Cloud</h2>
    
    <input type="file" id="cam" accept="image/*" capture="environment" style="display:none">
    <button class="btn btn-scan" onclick="document.getElementById('cam').click()">📸 TOMAR FOTO AL CÓDIGO</button>
    
    <div id="status">Iniciando conexión...</div>

    <div id="form" style="display:none; background:#f9f9f9; padding:15px; border-radius:15px; margin-bottom:20px; border: 1px solid #ddd;">
        <label>Nombre o Código:</label>
        <input type="text" id="pNombre" placeholder="Ej: Leche o 770...">
        <label>Fecha de Vencimiento:</label>
        <input type="date" id="pFecha">
        <button class="btn btn-save" onclick="enviar()">💾 GUARDAR EN LA NUBE</button>
    </div>

    <div id="lista"></div>
</div>

<script>
    // URL DE TU GOOGLE SCRIPT (YA ACTUALIZADA)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzbMNzNNKGpqvljaSuxrlsUDsmX1ZjbKDZVTTzFm6909NJ-8BHGcE_0m5W8wmc9PHJ0/exec";

    window.onload = cargar;

    // 1. CARGAR PRODUCTOS (GET)
    async function cargar() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerText = "🔄 Sincronizando...";
        statusDiv.style.color = "#3498db";

        try {
            // Agregamos timestamp para evitar caché
            const response = await fetch(WEB_APP_URL + "?t=" + Date.now());
            const datos = await response.json();
            
            dibujar(datos);
            statusDiv.innerText = "✅ Sincronizado con Google Sheets";
            statusDiv.style.color = "green";
        } catch(e) {
            statusDiv.innerText = "❌ Error al cargar datos";
            statusDiv.style.color = "red";
        }
    }

    // 2. ENVIAR PRODUCTO (POST)
    async function enviar() {
        const nombre = document.getElementById('pNombre').value;
        const fecha = document.getElementById('pFecha').value;
        
        if(!nombre || !fecha) return alert("Completa el nombre y la fecha");

        document.getElementById('status').innerText = "⏳ Enviando a la nube...";

        // Usamos parámetros en la URL para máxima compatibilidad con móviles
        const params = "?action=add&id=" + Date.now() + 
                       "&nombre=" + encodeURIComponent(nombre) + 
                       "&fecha=" + encodeURIComponent(fecha);

        try {
            await fetch(WEB_APP_URL + params, { method: "POST", mode: "no-cors" });
            
            document.getElementById('form').style.display = "none";
            document.getElementById('pNombre').value = "";
            document.getElementById('status').innerText = "💾 ¡Guardado! Actualizando lista...";
            
            // Esperamos 3 segundos para que Google escriba la fila
            setTimeout(cargar, 3000);
        } catch(err) {
            alert("Error al guardar: " + err);
        }
    }

    // 3. BORRAR PRODUCTO
    async function borrar(id) {
        if(!confirm("¿Eliminar este producto?")) return;
        document.getElementById('status').innerText = "🗑️ Eliminando...";
        
        await fetch(WEB_APP_URL + "?action=delete&id=" + id, { method: "POST", mode: "no-cors" });
        
        setTimeout(cargar, 2000);
    }

    // 4. MOSTRAR EN PANTALLA
    function dibujar(productos) {
        const div = document.getElementById('lista');
        div.innerHTML = "";
        
        if(productos.length === 0) {
            div.innerHTML = "<p style='text-align:center; color:grey; font-style:italic;'>No hay productos guardados.</p>";
            return;
        }

        // Ordenar por fecha (los más cercanos a vencer primero)
        productos.sort((a,b) => new Date(a.fecha) - new Date(b.fecha)).forEach(p => {
            div.innerHTML += `
                <div class="item">
                    <div>
                        <b style="font-size:16px; color:#2c3e50;">${p.nombre}</b><br>
                        <small style="color:#e67e22; font-weight:bold;">Vence: ${p.fecha}</small>
                    </div>
                    <button class="delete-btn" onclick="borrar(${p.id})">🗑️</button>
                </div>`;
        });
    }

    // 5. LECTOR DE CÓDIGO POR FOTO
    document.getElementById('cam').onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('form').style.display = "block";
        document.getElementById('status').innerText = "🔍 Analizando código...";
        
        Quagga.decodeSingle({
            src: URL.createObjectURL(file),
            decoder: { readers: ["ean_reader", "code_128_reader", "code_39_reader"] }
        }, (res) => {
            if(res) {
                document.getElementById('pNombre').value = res.codeResult.code;
                document.getElementById('status').innerText = "✅ Código detectado";
            } else {
                document.getElementById('status').innerText = "⚠️ No se leyó bien, escribe el nombre.";
            }
        });
    };
</script>
</body>
</html>
